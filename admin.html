<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Samuel Egwu</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

  <!-- ========== Login Gate ========== -->
  <div id="login-gate" class="login-gate">
    <div class="login-box">
      <div class="login-icon">&#128274;</div>
      <h2>Admin Access</h2>
      <p>Enter your PIN to manage blog posts</p>
      <div class="form-group">
        <label for="pin-input">PIN</label>
        <input type="password" id="pin-input" placeholder="Enter PIN" autocomplete="off" maxlength="10">
      </div>
      <p class="login-error" id="login-error">Incorrect PIN. Please try again.</p>
      <button class="btn btn-primary" id="login-btn" style="width:100%;">Unlock</button>
    </div>
  </div>

  <!-- ========== Admin Dashboard ========== -->
  <div id="admin-dashboard" class="admin-dashboard">

    <!-- Admin Nav -->
    <nav class="admin-nav">
      <span class="admin-brand">Admin Panel</span>
      <div class="admin-actions">
        <button class="btn btn-outline btn-sm" id="change-pin-btn">Change PIN</button>
        <button class="btn btn-outline btn-sm" id="export-btn">Export JSON</button>
        <a href="blog.html" class="btn btn-sm btn-outline" target="_blank">View Blog &nearr;</a>
        <button class="btn btn-danger btn-sm" id="logout-btn">Logout</button>
      </div>
    </nav>

    <div class="admin-container">

      <h2>Manage Blog Posts</h2>
      <p class="admin-subtitle">Create, edit, and publish posts. They will appear on your blog page automatically.</p>

      <!-- Post Form -->
      <div class="post-form" id="post-form">
        <h3 id="form-title">New Post</h3>

        <div class="form-row">
          <div class="form-group">
            <label for="post-title">Title</label>
            <input type="text" id="post-title" placeholder="Enter post title" maxlength="200">
          </div>
          <div class="form-group">
            <label for="post-date">Date</label>
            <input type="date" id="post-date">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="post-category">Category</label>
            <select id="post-category">
              <option value="">— Select —</option>
              <option value="Milestone">Milestone</option>
              <option value="Research">Research</option>
              <option value="Publication">Publication</option>
              <option value="Award">Award</option>
              <option value="Talk">Talk / Presentation</option>
              <option value="Update">Update</option>
              <option value="Reflection">Reflection</option>
            </select>
          </div>
          <div class="form-group">
            <label for="post-status">Status</label>
            <select id="post-status">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="post-content">Content</label>
          <textarea id="post-content" placeholder="Write your post content here..."></textarea>
        </div>

        <input type="hidden" id="edit-id" value="">
        <div class="form-actions">
          <button class="btn btn-primary" id="save-post-btn">Save Post</button>
          <button class="btn btn-outline" id="cancel-edit-btn" style="display:none;">Cancel</button>
        </div>
      </div>

      <!-- Post List -->
      <h3 style="margin-bottom:1rem;">All Posts</h3>
      <div id="admin-post-list" class="admin-post-list">
        <!-- Dynamically populated -->
      </div>
      <div id="admin-post-empty" style="text-align:center;padding:3rem 0;display:none;">
        <p style="color:var(--text-muted);">No posts yet. Create your first post above.</p>
      </div>

    </div>
  </div>

  <!-- Change PIN Modal -->
  <div id="pin-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" id="pin-modal-close">&times;</button>
      <h2>Change PIN</h2>
      <div class="form-group">
        <label for="new-pin">New PIN</label>
        <input type="password" id="new-pin" placeholder="Enter new PIN" maxlength="10" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="confirm-pin">Confirm New PIN</label>
        <input type="password" id="confirm-pin" placeholder="Confirm new PIN" maxlength="10" autocomplete="off">
      </div>
      <p id="pin-modal-error" style="color:#f87171;font-size:0.8rem;display:none;margin-bottom:0.75rem;"></p>
      <button class="btn btn-primary" id="save-pin-btn">Save PIN</button>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast" class="toast" style="display:none;"></div>

  <script>
    /* ===== Admin Logic ===== */

    // --- Constants ---
    const DEFAULT_PIN = '2026';
    const STORAGE_KEY_POSTS = 'admin_posts';
    const STORAGE_KEY_PIN = 'admin_pin';

    // --- State ---
    let currentPosts = [];
    let editingId = null;

    // --- Helpers ---
    function getPin() {
      return localStorage.getItem(STORAGE_KEY_PIN) || DEFAULT_PIN;
    }

    function savePin(pin) {
      localStorage.setItem(STORAGE_KEY_PIN, pin);
    }

    function getPosts() {
      const raw = localStorage.getItem(STORAGE_KEY_POSTS);
      try {
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function savePosts(posts) {
      localStorage.setItem(STORAGE_KEY_POSTS, JSON.stringify(posts));
    }

    function generateId() {
      return 'post-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    }

    function formatDateShort(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // --- Login ---
    document.getElementById('login-btn').addEventListener('click', function() {
      const input = document.getElementById('pin-input').value.trim();
      const storedPin = getPin();
      if (input === storedPin) {
        document.getElementById('login-gate').classList.add('hidden');
        document.getElementById('admin-dashboard').classList.add('visible');
        document.getElementById('login-error').classList.remove('visible');
        document.getElementById('pin-input').value = '';
        loadPosts();
      } else {
        document.getElementById('login-error').classList.add('visible');
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-input').focus();
      }
    });

    document.getElementById('pin-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('login-btn').click();
      }
    });

    // --- Logout ---
    document.getElementById('logout-btn').addEventListener('click', function() {
      document.getElementById('admin-dashboard').classList.remove('visible');
      document.getElementById('login-gate').classList.remove('hidden');
      document.getElementById('pin-input').focus();
      resetForm();
    });

    // --- Load & Render Posts ---
    function loadPosts() {
      currentPosts = getPosts();
      renderPostList();
    }

    function renderPostList() {
      const list = document.getElementById('admin-post-list');
      const empty = document.getElementById('admin-post-empty');

      if (currentPosts.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      // Sort by date descending
      const sorted = [...currentPosts].sort((a, b) => new Date(b.date) - new Date(a.date));

      list.innerHTML = sorted.map(post => `
        <div class="admin-post-item">
          <div class="admin-post-info">
            <h4>${escapeHtml(post.title)}</h4>
            <div class="admin-post-meta">
              <span>${formatDateShort(post.date)}</span>
              ${post.category ? `<span>${escapeHtml(post.category)}</span>` : ''}
              <span class="status-badge ${post.status}">${post.status}</span>
            </div>
          </div>
          <div class="admin-post-actions">
            <button class="btn btn-outline btn-sm" onclick="editPost('${post.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deletePost('${post.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    // --- Save Post ---
    document.getElementById('save-post-btn').addEventListener('click', function() {
      const title = document.getElementById('post-title').value.trim();
      const date = document.getElementById('post-date').value;
      const category = document.getElementById('post-category').value;
      const status = document.getElementById('post-status').value;
      const content = document.getElementById('post-content').value.trim();

      if (!title) {
        showToast('Please enter a title.', 'error');
        return;
      }
      if (!date) {
        showToast('Please select a date.', 'error');
        return;
      }
      if (!content) {
        showToast('Please write some content.', 'error');
        return;
      }

      const id = editingId || generateId();
      const post = { id, title, date, category, status, content };

      if (editingId) {
        // Update existing
        currentPosts = currentPosts.map(p => p.id === editingId ? post : p);
      } else {
        // New post
        currentPosts.push(post);
      }

      savePosts(currentPosts);
      loadPosts();
      resetForm();
      showToast(editingId ? 'Post updated successfully.' : 'Post created successfully.', 'success');
      editingId = null;
    });

    // --- Edit Post ---
    function editPost(id) {
      const post = currentPosts.find(p => p.id === id);
      if (!post) return;

      editingId = post.id;
      document.getElementById('edit-id').value = post.id;
      document.getElementById('post-title').value = post.title;
      document.getElementById('post-date').value = post.date;
      document.getElementById('post-category').value = post.category || '';
      document.getElementById('post-status').value = post.status;
      document.getElementById('post-content').value = post.content;

      document.getElementById('form-title').textContent = 'Edit Post';
      document.getElementById('save-post-btn').textContent = 'Update Post';
      document.getElementById('cancel-edit-btn').style.display = 'inline-block';

      // Scroll to form
      document.getElementById('post-form').scrollIntoView({ behavior: 'smooth' });
    }

    // --- Cancel Edit ---
    document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

    function resetForm() {
      editingId = null;
      document.getElementById('edit-id').value = '';
      document.getElementById('post-title').value = '';
      document.getElementById('post-date').value = '';
      document.getElementById('post-category').value = '';
      document.getElementById('post-status').value = 'draft';
      document.getElementById('post-content').value = '';
      document.getElementById('form-title').textContent = 'New Post';
      document.getElementById('save-post-btn').textContent = 'Save Post';
      document.getElementById('cancel-edit-btn').style.display = 'none';
    }

    // --- Delete Post ---
    function deletePost(id) {
      if (!confirm('Are you sure you want to delete this post? This cannot be undone.')) return;
      currentPosts = currentPosts.filter(p => p.id !== id);
      savePosts(currentPosts);
      loadPosts();
      if (editingId === id) resetForm();
      showToast('Post deleted.', 'success');
    }

    // --- Export JSON ---
    document.getElementById('export-btn').addEventListener('click', function() {
      const data = JSON.stringify(currentPosts, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'blog_posts_backup_' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Posts exported as JSON.', 'success');
    });

    // --- Change PIN ---
    document.getElementById('change-pin-btn').addEventListener('click', function() {
      document.getElementById('pin-modal').style.display = 'flex';
      document.getElementById('new-pin').value = '';
      document.getElementById('confirm-pin').value = '';
      document.getElementById('pin-modal-error').style.display = 'none';
    });

    document.getElementById('pin-modal-close').addEventListener('click', function() {
      document.getElementById('pin-modal').style.display = 'none';
    });

    document.getElementById('pin-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        document.getElementById('pin-modal').style.display = 'none';
      }
    });

    document.getElementById('save-pin-btn').addEventListener('click', function() {
      const newPin = document.getElementById('new-pin').value.trim();
      const confirmPin = document.getElementById('confirm-pin').value.trim();
      const errorEl = document.getElementById('pin-modal-error');

      if (!newPin || newPin.length < 3) {
        errorEl.textContent = 'PIN must be at least 3 characters.';
        errorEl.style.display = 'block';
        return;
      }
      if (newPin !== confirmPin) {
        errorEl.textContent = 'PINs do not match.';
        errorEl.style.display = 'block';
        return;
      }

      savePin(newPin);
      document.getElementById('pin-modal').style.display = 'none';
      showToast('PIN changed successfully. Use the new PIN next time you log in.', 'success');
    });

    // --- Init ---
    // Set today's date as default
    document.getElementById('post-date').value = new Date().toISOString().slice(0, 10);

    // Focus PIN input on load
    document.getElementById('pin-input').focus();
  </script>

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-796SDYQKFT');
  </script>

</body>
</html>
