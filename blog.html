<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Samuel Onuche-Ojo Egwu</title>
  <meta name="description" content="Updates, achievements, and research reflections from Samuel Onuche-Ojo Egwu.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-796SDYQKFT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-796SDYQKFT');
  </script>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo"><img src="Logo.JPG" alt="S.O. Egwu" class="logo-img" height="40"></a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Portfolio</a></li>
        <li><a href="blog.html" class="nav-active">Blog</a></li>
      </ul>
    </div>
  </nav>

  <!-- Blog Hero -->
  <section class="blog-hero">
    <div class="container">
      <h1>Notes & Updates</h1>
      <p>Thoughts on research, recent achievements, and reflections from the journey.</p>
    </div>
  </section>

  <!-- Blog Grid -->
  <section class="section">
    <div class="container">
      <div id="blog-grid" class="blog-grid">
        <!-- Dynamically populated by JS -->
      </div>
      <div id="blog-empty" class="blog-empty" style="display:none;">
        <h3>No posts yet</h3>
        <p>Check back soon for updates and achievements.</p>
      </div>
    </div>
  </section>

  <!-- Blog Detail Modal -->
  <div id="blog-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-date" id="modal-date"></div>
      <h2 id="modal-title"></h2>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 <span class="footer-accent">Samuel Onuche-Ojo Egwu</span> &mdash; Abuja, Nigeria</p>
    </div>
  </footer>

  <script src="posts.js"></script>
  <script>
    /* ===== Blog Logic ===== */

    // Merge seed posts from posts.js with admin-added posts from localStorage
    function getAllPosts() {
      const seedPosts = typeof SEED_POSTS !== 'undefined' ? SEED_POSTS : [];
      const stored = localStorage.getItem('admin_posts');
      let adminPosts = [];
      try {
        adminPosts = stored ? JSON.parse(stored) : [];
      } catch (e) {
        adminPosts = [];
      }
      // Only show published posts from admin
      const publishedAdmin = adminPosts.filter(p => p.status === 'published');
      // Combine, sort by date descending
      const all = [...seedPosts, ...publishedAdmin];
      all.sort((a, b) => new Date(b.date) - new Date(a.date));
      return all;
    }

    // Format date for display
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return d.toLocaleDateString('en-US', options);
    }

    // Render blog cards
    function renderBlog() {
      const posts = getAllPosts();
      const grid = document.getElementById('blog-grid');
      const empty = document.getElementById('blog-empty');

      if (posts.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = posts.map((post, index) => `
        <article class="blog-card" data-index="${index}" onclick="openPost(${index})">
          <div class="blog-card-header">
            <span class="blog-card-date">${formatDate(post.date)}</span>
            ${post.category ? `<span class="blog-card-category">${post.category}</span>` : ''}
          </div>
          <h2>${escapeHtml(post.title)}</h2>
          <p class="blog-excerpt">${truncateText(post.content, 180)}</p>
          <span class="read-more">Read more &rarr;</span>
        </article>
      `).join('');
    }

    // Escape HTML
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Truncate text
    function truncateText(text, maxLen) {
      if (text.length <= maxLen) return escapeHtml(text);
      return escapeHtml(text.slice(0, maxLen).trimEnd()) + '&hellip;';
    }

    // Open modal with post detail
    function openPost(index) {
      const posts = getAllPosts();
      const post = posts[index];
      if (!post) return;

      document.getElementById('modal-date').textContent = formatDate(post.date);
      document.getElementById('modal-title').textContent = post.title;
      document.getElementById('modal-body').innerHTML = post.content
        .split('\n')
        .map(line => escapeHtml(line))
        .join('<br>');

      document.getElementById('blog-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    // Close modal
    function closeModal() {
      document.getElementById('blog-modal').style.display = 'none';
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('blog-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // Initial render
    renderBlog();

    /* ===== Scroll Reveal ===== */
    const revealEls = document.querySelectorAll('.blog-card');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('reveal-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

    revealEls.forEach(el => {
      el.classList.add('reveal');
      observer.observe(el);
    });

    /* ===== Mobile Nav Toggle ===== */
    (function () {
      const toggle = document.getElementById('nav-toggle');
      const links = document.getElementById('nav-links');
      if (!toggle || !links) return;
      const setOpen = (open) => {
        links.classList.toggle('open', open);
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      };
      toggle.addEventListener('click', () => setOpen(!links.classList.contains('open')));
      links.addEventListener('click', (e) => { if (e.target.tagName === 'A') setOpen(false); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setOpen(false); });
    })();
  </script>

</body>
</html>
